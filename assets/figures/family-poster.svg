<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="fp-title fp-desc" font-family="'Iowan Old Style','Georgia','Times New Roman',serif">
  <title id="fp-title">Charles &amp; Auguste Konzen Family — printable poster</title>
  <desc id="fp-desc">A printable family-tree poster of Charles Konzen and Auguste Kreichelt, with their seven children and key biographical detail. Designed for A4 / Letter / A3 printing; intended for descendants to print and frame.</desc>

  <defs>
    <linearGradient id="fp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="100%" stop-color="#f6ebd2"/>
    </linearGradient>
    <linearGradient id="fp-border" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a88a4a"/>
      <stop offset="50%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#a88a4a"/>
    </linearGradient>
    <pattern id="fp-grain" patternUnits="userSpaceOnUse" width="6" height="6">
      <circle cx="3" cy="3" r="0.4" fill="#8a7858" opacity="0.06"/>
    </pattern>
    <filter id="fp-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1080" height="1440" fill="url(#fp-bg)"/>
  <rect x="0" y="0" width="1080" height="1440" fill="url(#fp-grain)"/>

  <!-- Decorative outer border / frame -->
  <rect x="36" y="36" width="1008" height="1368" rx="6" fill="none" stroke="url(#fp-border)" stroke-width="2.5"/>
  <rect x="48" y="48" width="984" height="1344" rx="3" fill="none" stroke="#a88a4a" stroke-width="0.7" stroke-dasharray="2,3"/>

  <!-- Title block -->
  <text x="540" y="118" text-anchor="middle" font-size="14" fill="#8a5a14" font-weight="700" letter-spacing="6">— A GENEALOGICAL FAMILY POSTER —</text>
  <text x="540" y="180" text-anchor="middle" font-size="50" fill="#1f1a14" font-weight="700" letter-spacing="0.5">The Konzen / Johnson Family</text>
  <text x="540" y="216" text-anchor="middle" font-size="22" fill="#5a4a32" font-style="italic">St. Marcus Evangelical Parish · St. Louis, Missouri · 1866–1903</text>

  <!-- Decorative double rule under title -->
  <line x1="220" y1="246" x2="860" y2="246" stroke="#d4a017" stroke-width="1.5"/>
  <line x1="320" y1="252" x2="760" y2="252" stroke="#a88a4a" stroke-width="0.6"/>

  <!-- ==================== FOUNDING COUPLE ==================== -->
  <!-- Charles -->
  <g transform="translate(220, 286)" filter="url(#fp-shadow)">
    <rect x="0" y="0" width="290" height="190" rx="6" fill="#fffaee" stroke="#8a5a14" stroke-width="2"/>
    <text x="145" y="32" text-anchor="middle" font-size="13" fill="#8a5a14" font-weight="700" letter-spacing="3">★ FATHER</text>
    <text x="145" y="65" text-anchor="middle" font-size="28" fill="#1f1a14" font-weight="700">Charles Konzen</text>
    <text x="145" y="86" text-anchor="middle" font-size="13" fill="#5a4a32" font-style="italic">also Gannsen · Konsen · Johnson</text>
    <line x1="40" y1="98" x2="250" y2="98" stroke="#a88a4a" stroke-width="0.5"/>
    <text x="145" y="118" text-anchor="middle" font-size="13" fill="#3a2f1e">b. <tspan font-weight="700">26 January 1835</tspan></text>
    <text x="145" y="135" text-anchor="middle" font-size="11.5" fill="#5a4a32" font-style="italic">Hesse-Kassel (Churhessen)</text>
    <text x="145" y="148" text-anchor="middle" font-size="11.5" fill="#5a4a32" font-style="italic">Trendelburg / Deisel parish complex</text>
    <text x="145" y="170" text-anchor="middle" font-size="13" fill="#3a2f1e">d. <tspan font-weight="700">19 December 1903</tspan></text>
    <text x="145" y="184" text-anchor="middle" font-size="11.5" fill="#5a4a32" font-style="italic">St. Louis · age 68</text>
  </g>

  <!-- Marriage glyph (ring + date) -->
  <g transform="translate(540, 380)">
    <circle cx="0" cy="0" r="26" fill="#fff3d6" stroke="#d4a017" stroke-width="2.5"/>
    <text x="0" y="-4" text-anchor="middle" font-size="11" fill="#8a5a14" font-weight="700" letter-spacing="1">m.</text>
    <text x="0" y="10" text-anchor="middle" font-size="10" fill="#5a4a32">7 Jan 1866</text>
    <text x="0" y="55" text-anchor="middle" font-size="11" fill="#6a5a42" font-style="italic">St. Marcus, St. Louis</text>
  </g>

  <!-- Auguste -->
  <g transform="translate(570, 286)" filter="url(#fp-shadow)">
    <rect x="0" y="0" width="290" height="190" rx="6" fill="#fffaee" stroke="#8a5a14" stroke-width="2"/>
    <text x="145" y="32" text-anchor="middle" font-size="13" fill="#8a5a14" font-weight="700" letter-spacing="3">★ MOTHER</text>
    <text x="145" y="65" text-anchor="middle" font-size="28" fill="#1f1a14" font-weight="700">Auguste Kreichelt</text>
    <text x="145" y="86" text-anchor="middle" font-size="13" fill="#5a4a32" font-style="italic">married name Konzen / Johnson</text>
    <line x1="40" y1="98" x2="250" y2="98" stroke="#a88a4a" stroke-width="0.5"/>
    <text x="145" y="118" text-anchor="middle" font-size="13" fill="#3a2f1e">b. <tspan font-weight="700">1843</tspan></text>
    <text x="145" y="135" text-anchor="middle" font-size="11.5" fill="#5a4a32" font-style="italic">Hesse-Cassel · emigrated 1853</text>
    <text x="145" y="148" text-anchor="middle" font-size="11.5" fill="#5a4a32" font-style="italic">daughter of Georg &amp; Henriette</text>
    <text x="145" y="170" text-anchor="middle" font-size="13" fill="#3a2f1e">d. <tspan font-weight="700">1896</tspan></text>
    <text x="145" y="184" text-anchor="middle" font-size="11.5" fill="#5a4a32" font-style="italic">St. Louis · age ~53</text>
  </g>

  <!-- Connector lines from couple down to child row -->
  <line x1="365" y1="476" x2="365" y2="510" stroke="#5a4a32" stroke-width="1.2"/>
  <line x1="715" y1="476" x2="715" y2="510" stroke="#5a4a32" stroke-width="1.2"/>
  <line x1="365" y1="510" x2="715" y2="510" stroke="#5a4a32" stroke-width="1.2"/>
  <line x1="540" y1="436" x2="540" y2="510" stroke="#a88a4a" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- Horizontal trunk for children -->
  <line x1="120" y1="546" x2="960" y2="546" stroke="#5a4a32" stroke-width="1.2"/>
  <line x1="540" y1="510" x2="540" y2="546" stroke="#5a4a32" stroke-width="1.2"/>

  <!-- "Seven Children" header -->
  <rect x="350" y="490" width="380" height="22" rx="3" fill="#fff3d6" stroke="#d4a017" stroke-width="0.6"/>
  <text x="540" y="506" text-anchor="middle" font-size="13" fill="#8a5a14" font-weight="700" letter-spacing="3">★ THE SEVEN CHILDREN ★</text>

  <!-- ==================== SEVEN CHILDREN ==================== -->
  <!-- Layout: two rows of 4 + 3, centered. Each child card 220 wide × 200 tall. -->
  <!-- Row 1: Children 1-4 -->
  <!-- Row 2: Children 5-7 (centered, 3 cards) -->

  <!-- Child connectors from trunk down -->
  <g stroke="#5a4a32" stroke-width="0.9">
    <line x1="160" y1="546" x2="160" y2="580"/>
    <line x1="370" y1="546" x2="370" y2="580"/>
    <line x1="580" y1="546" x2="580" y2="580"/>
    <line x1="790" y1="546" x2="790" y2="580"/>
  </g>

  <!-- Child 1: Friedrich Wilhelm 1866-1867 (died young) -->
  <g transform="translate(60, 580)" filter="url(#fp-shadow)">
    <rect x="0" y="0" width="200" height="170" rx="5" fill="#fffaf0" stroke="#a88a4a" stroke-width="1.4"/>
    <text x="100" y="22" text-anchor="middle" font-size="10" fill="#8a5a14" font-weight="700" letter-spacing="2">CHILD 1 · 1866</text>
    <text x="100" y="50" text-anchor="middle" font-size="17" fill="#1f1a14" font-weight="700">Friedrich Wilhelm</text>
    <text x="100" y="68" text-anchor="middle" font-size="11" fill="#6a5a42" font-style="italic">surname rec'd "Gonnson"</text>
    <line x1="20" y1="80" x2="180" y2="80" stroke="#d8c8a8"/>
    <text x="100" y="102" text-anchor="middle" font-size="11.5" fill="#3a2f1e">b. 20 Jun 1866</text>
    <text x="100" y="118" text-anchor="middle" font-size="11.5" fill="#3a2f1e">d. 26 Oct 1867 · age 1</text>
    <text x="100" y="143" text-anchor="middle" font-size="10.5" fill="#8a3a3a" font-style="italic">named for Friedrich Wilhelm I,</text>
    <text x="100" y="156" text-anchor="middle" font-size="10.5" fill="#8a3a3a" font-style="italic">Elector of Hesse, deposed</text>
    <text x="100" y="167" text-anchor="middle" font-size="10.5" fill="#8a3a3a" font-style="italic">three days after his birth</text>
  </g>

  <!-- Child 2: Josephine Maria 1868-1890 -->
  <g transform="translate(270, 580)" filter="url(#fp-shadow)">
    <rect x="0" y="0" width="200" height="170" rx="5" fill="#fffaf0" stroke="#a88a4a" stroke-width="1.4"/>
    <text x="100" y="22" text-anchor="middle" font-size="10" fill="#8a5a14" font-weight="700" letter-spacing="2">CHILD 2 · 1868</text>
    <text x="100" y="50" text-anchor="middle" font-size="17" fill="#1f1a14" font-weight="700">Josephine Maria</text>
    <text x="100" y="68" text-anchor="middle" font-size="11" fill="#6a5a42" font-style="italic">later Auguste Somers</text>
    <line x1="20" y1="80" x2="180" y2="80" stroke="#d8c8a8"/>
    <text x="100" y="102" text-anchor="middle" font-size="11.5" fill="#3a2f1e">1868 – 1890 · died at 22</text>
    <text x="100" y="124" text-anchor="middle" font-size="10.5" fill="#5a4a32" font-style="italic">1890 death record reads</text>
    <text x="100" y="137" text-anchor="middle" font-size="10.5" fill="#5a4a32" font-style="italic">"geb Konzen" — the only</text>
    <text x="100" y="150" text-anchor="middle" font-size="10.5" fill="#5a4a32" font-style="italic">American z-form, 15 yrs after 1875</text>
  </g>

  <!-- Child 3: Katherine Carolina 1870-1949 -->
  <g transform="translate(480, 580)" filter="url(#fp-shadow)">
    <rect x="0" y="0" width="200" height="170" rx="5" fill="#fffaf0" stroke="#a88a4a" stroke-width="1.4"/>
    <text x="100" y="22" text-anchor="middle" font-size="10" fill="#8a5a14" font-weight="700" letter-spacing="2">CHILD 3 · 1870</text>
    <text x="100" y="50" text-anchor="middle" font-size="17" fill="#1f1a14" font-weight="700">Katherine Carolina</text>
    <text x="100" y="68" text-anchor="middle" font-size="11" fill="#6a5a42" font-style="italic">surname rec'd "Gansen"</text>
    <line x1="20" y1="80" x2="180" y2="80" stroke="#d8c8a8"/>
    <text x="100" y="102" text-anchor="middle" font-size="11.5" fill="#3a2f1e">1870 – 1949 · age 79</text>
    <text x="100" y="124" text-anchor="middle" font-size="10.5" fill="#5a4a32" font-style="italic">Pastor Braschler "smoking</text>
    <text x="100" y="137" text-anchor="middle" font-size="10.5" fill="#5a4a32" font-style="italic">gun" — same scribe two</text>
    <text x="100" y="150" text-anchor="middle" font-size="10.5" fill="#5a4a32" font-style="italic">years later wrote "Gonsen"</text>
  </g>

  <!-- Child 4: Auguste 1872-1890 -->
  <g transform="translate(690, 580)" filter="url(#fp-shadow)">
    <rect x="0" y="0" width="200" height="170" rx="5" fill="#fffaf0" stroke="#a88a4a" stroke-width="1.4"/>
    <text x="100" y="22" text-anchor="middle" font-size="10" fill="#8a5a14" font-weight="700" letter-spacing="2">CHILD 4 · 1872</text>
    <text x="100" y="50" text-anchor="middle" font-size="17" fill="#1f1a14" font-weight="700">Auguste</text>
    <text x="100" y="68" text-anchor="middle" font-size="11" fill="#6a5a42" font-style="italic">surname rec'd "Gonsen"</text>
    <line x1="20" y1="80" x2="180" y2="80" stroke="#d8c8a8"/>
    <text x="100" y="102" text-anchor="middle" font-size="11.5" fill="#3a2f1e">1872 – 1890 · died at 18</text>
    <text x="100" y="124" text-anchor="middle" font-size="10.5" fill="#5a4a32" font-style="italic">paired with sister Katherine's</text>
    <text x="100" y="137" text-anchor="middle" font-size="10.5" fill="#5a4a32" font-style="italic">1870 baptism in the surname-</text>
    <text x="100" y="150" text-anchor="middle" font-size="10.5" fill="#5a4a32" font-style="italic">trail evidence (Braschler)</text>
  </g>

  <!-- Connector trunk for row 2 -->
  <line x1="270" y1="780" x2="810" y2="780" stroke="#5a4a32" stroke-width="1.2"/>
  <line x1="540" y1="546" x2="540" y2="780" stroke="#a88a4a" stroke-width="0.5" stroke-dasharray="2,3"/>
  <g stroke="#5a4a32" stroke-width="0.9">
    <line x1="320" y1="780" x2="320" y2="810"/>
    <line x1="540" y1="780" x2="540" y2="810"/>
    <line x1="760" y1="780" x2="760" y2="810"/>
  </g>

  <!-- Child 5: Louise 1873-1947 -->
  <g transform="translate(220, 810)" filter="url(#fp-shadow)">
    <rect x="0" y="0" width="200" height="170" rx="5" fill="#fffaf0" stroke="#a88a4a" stroke-width="1.4"/>
    <text x="100" y="22" text-anchor="middle" font-size="10" fill="#8a5a14" font-weight="700" letter-spacing="2">CHILD 5 · 1873</text>
    <text x="100" y="50" text-anchor="middle" font-size="20" fill="#1f1a14" font-weight="700">Louise</text>
    <text x="100" y="69" text-anchor="middle" font-size="11" fill="#6a5a42" font-style="italic">later Louise Johnson</text>
    <line x1="20" y1="82" x2="180" y2="82" stroke="#d8c8a8"/>
    <text x="100" y="104" text-anchor="middle" font-size="11.5" fill="#3a2f1e">1873 – 1947 · age 74</text>
    <text x="100" y="125" text-anchor="middle" font-size="10.5" fill="#5a4a32" font-style="italic">named for her grandmother</text>
    <text x="100" y="138" text-anchor="middle" font-size="10.5" fill="#5a4a32" font-style="italic">"Louise Henriette" Kreichelt</text>
    <text x="100" y="151" text-anchor="middle" font-size="10.5" fill="#5a4a32" font-style="italic">née Weiss; long life</text>
  </g>

  <!-- Child 6: Erwin Carl Konsen 1875-1950 (KEY) -->
  <g transform="translate(440, 810)" filter="url(#fp-shadow)">
    <rect x="0" y="0" width="200" height="170" rx="5" fill="#fff3d6" stroke="#d4a017" stroke-width="2.5"/>
    <text x="100" y="22" text-anchor="middle" font-size="10" fill="#8a5a14" font-weight="700" letter-spacing="2">★ CHILD 6 · 1875 ★</text>
    <text x="100" y="50" text-anchor="middle" font-size="17" fill="#1f1a14" font-weight="700">Erwin Carl <tspan fill="#a3441f">Konsen</tspan></text>
    <text x="100" y="69" text-anchor="middle" font-size="11" fill="#a3441f" font-style="italic" font-weight="600">later Charles Johnson Jr.</text>
    <line x1="20" y1="82" x2="180" y2="82" stroke="#d4a017"/>
    <text x="100" y="104" text-anchor="middle" font-size="11.5" fill="#3a2f1e">1875 – 1950 · age 75</text>
    <text x="100" y="125" text-anchor="middle" font-size="10.5" fill="#5a4a32" font-style="italic"><tspan font-weight="700">surname-preservation key</tspan> —</text>
    <text x="100" y="138" text-anchor="middle" font-size="10.5" fill="#5a4a32" font-style="italic">Pastor Hoffmann recorded</text>
    <text x="100" y="151" text-anchor="middle" font-size="10.5" fill="#5a4a32" font-style="italic">the German <em>-en</em> form here</text>
    <text x="100" y="164" text-anchor="middle" font-size="10" fill="#a3441f" font-weight="600">surviving descendant line ↓</text>
  </g>

  <!-- Child 7: Bertha 1880-1959 (KEY) -->
  <g transform="translate(660, 810)" filter="url(#fp-shadow)">
    <rect x="0" y="0" width="200" height="170" rx="5" fill="#fff3d6" stroke="#d4a017" stroke-width="2.5"/>
    <text x="100" y="22" text-anchor="middle" font-size="10" fill="#8a5a14" font-weight="700" letter-spacing="2">★ CHILD 7 · 1880 ★</text>
    <text x="100" y="50" text-anchor="middle" font-size="20" fill="#1f1a14" font-weight="700">Bertha</text>
    <text x="100" y="69" text-anchor="middle" font-size="11" fill="#6a5a42" font-style="italic">later Bertha Johnson</text>
    <line x1="20" y1="82" x2="180" y2="82" stroke="#d4a017"/>
    <text x="100" y="104" text-anchor="middle" font-size="11.5" fill="#3a2f1e">1880 – 1959 · age 78</text>
    <text x="100" y="125" text-anchor="middle" font-size="10.5" fill="#5a4a32" font-style="italic">surname rec'd "Jansen" on</text>
    <text x="100" y="138" text-anchor="middle" font-size="10.5" fill="#5a4a32" font-style="italic">1881 baptism · Anglicization</text>
    <text x="100" y="151" text-anchor="middle" font-size="10.5" fill="#5a4a32" font-style="italic">bridge to "Johnson"</text>
    <text x="100" y="164" text-anchor="middle" font-size="10" fill="#a3441f" font-weight="600">surviving descendant line ↓</text>
  </g>

  <!-- ==================== DESCENDANT NOTE ==================== -->
  <g transform="translate(120, 1010)">
    <rect x="0" y="0" width="840" height="100" rx="5" fill="#fffaee" stroke="#8a5a14" stroke-width="1.5"/>
    <text x="420" y="26" text-anchor="middle" font-size="11" fill="#8a5a14" font-weight="700" letter-spacing="3">SURVIVING DESCENDANT LINES</text>
    <text x="420" y="50" text-anchor="middle" font-size="13" fill="#3a2f1e">Two surviving descendant lines today, both traceable through <tspan font-weight="700">Erwin Carl Konsen</tspan> (1875–1950) and <tspan font-weight="700">Bertha Johnson</tspan> (1880–1959).</text>
    <text x="420" y="68" text-anchor="middle" font-size="12" fill="#5a4a32" font-style="italic">Most descendants today carry the surname Johnson; some lines married into Sommers, Somers,</text>
    <text x="420" y="84" text-anchor="middle" font-size="12" fill="#5a4a32" font-style="italic">and other names in the early twentieth century. See the project's Family Tree tab for full detail.</text>
  </g>

  <!-- ==================== SURNAME TRAIL FOOTNOTE ==================== -->
  <g transform="translate(120, 1138)">
    <rect x="0" y="0" width="840" height="120" rx="5" fill="#fff" stroke="#a88a4a" stroke-width="1"/>
    <text x="420" y="26" text-anchor="middle" font-size="11" fill="#8a5a14" font-weight="700" letter-spacing="3">★ THE SURNAME, IN EIGHT AMERICAN RENDERINGS ★</text>
    <g font-family="'SF Mono','Menlo',monospace" font-size="12" fill="#3a2f1e">
      <text x="420" y="56" text-anchor="middle" letter-spacing="1.6"><tspan font-weight="700">Gonnson</tspan> · <tspan font-weight="700">Gansen</tspan> · <tspan font-weight="700">Gonsen</tspan> · <tspan font-weight="700" fill="#a3441f">Konsen</tspan> · <tspan font-weight="700">Jansen</tspan> · <tspan font-weight="700">Gonson</tspan> · <tspan font-weight="700" fill="#a3441f">Konzen</tspan> · <tspan font-weight="700">Conson</tspan></text>
    </g>
    <text x="420" y="78" text-anchor="middle" font-size="11.5" fill="#5a4a32" font-style="italic">across 1866 marriage · 1870/1872/1874/1875/1881 baptisms · 1880 census · 1890 daughter's death · 1896 wife's death</text>
    <text x="420" y="102" text-anchor="middle" font-size="13" fill="#a3441f" font-weight="700">May 2026 conclusion: Charles's German surname is <tspan font-size="16">KONZEN</tspan></text>
  </g>

  <!-- ==================== Bottom citation strip ==================== -->
  <line x1="120" y1="1296" x2="960" y2="1296" stroke="#d4a017" stroke-width="1.5"/>
  <line x1="220" y1="1302" x2="860" y2="1302" stroke="#a88a4a" stroke-width="0.5"/>

  <text x="540" y="1326" text-anchor="middle" font-size="11" fill="#5a4a32" letter-spacing="1">From the project</text>
  <text x="540" y="1346" text-anchor="middle" font-size="14" fill="#1f1a14" font-weight="700" letter-spacing="2">CHARLES KONZEN RESEARCH</text>
  <text x="540" y="1364" text-anchor="middle" font-size="11" fill="#5a4a32" font-style="italic">A genealogical investigation by Jed Johnson with Peter Schräder, Trendelburg</text>
  <text x="540" y="1380" text-anchor="middle" font-size="10" fill="#6a5a42">charles-research.netlify.app · last updated 7 May 2026</text>

</svg>
