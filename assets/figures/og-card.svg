<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" preserveAspectRatio="xMidYMid meet" font-family="'Iowan Old Style','Georgia','Times New Roman',serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#1f1a14"/>
      <stop offset="50%" stop-color="#3a2f1e"/>
      <stop offset="100%" stop-color="#1f1a14"/>
    </linearGradient>
    <radialGradient id="warm" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#d4a017" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#d4a017" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cool" cx="15%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#4a76c8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4a76c8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grain" patternUnits="userSpaceOnUse" width="6" height="6">
      <circle cx="3" cy="3" r="0.5" fill="#d4a017" opacity="0.07"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#warm)"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#cool)"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#grain)"/>

  <!-- Top double-gold line (matches site header treatment) -->
  <line x1="60" y1="86" x2="1140" y2="86" stroke="#d4a017" stroke-width="2.5"/>
  <line x1="60" y1="92" x2="1140" y2="92" stroke="#d4a017" stroke-width="0.8"/>

  <!-- Eyebrow -->
  <text x="60" y="73" fill="#d4a017" font-size="16" font-weight="700" letter-spacing="6">A GENEALOGICAL INVESTIGATION</text>

  <!-- Main title -->
  <text x="60" y="190" fill="#f6f1e7" font-size="68" font-weight="700" letter-spacing="0.5">Charles Konzen</text>
  <text x="60" y="244" fill="#c8b896" font-size="26" font-style="italic" letter-spacing="1">a.k.a. Gannsen, Gonsen, Konsen, Conson · later Johnson</text>

  <!-- Date strip -->
  <text x="60" y="310" fill="#d4a017" font-size="22" font-weight="700" letter-spacing="3">26 JAN 1835 — 19 DEC 1903</text>

  <!-- Sub-line -->
  <text x="60" y="348" fill="#f6f1e7" font-size="22">Hessian-born · Civil War sergeant, Battery B, 2nd Missouri Light Artillery</text>
  <text x="60" y="378" fill="#f6f1e7" font-size="22">Buried at Old Saint Marcus Cemetery, St. Louis</text>

  <!-- Decorative geographic strip — Hesse → Atlantic → St. Louis -->
  <g transform="translate(60, 430)">
    <!-- Hesse box -->
    <rect x="0" y="0" width="320" height="64" rx="4" fill="#5a8a4a" opacity="0.85"/>
    <text x="160" y="28" text-anchor="middle" fill="#fff" font-size="12" font-weight="700" letter-spacing="3">HESSE · CHURHESSEN</text>
    <text x="160" y="50" text-anchor="middle" fill="#f4f9ee" font-size="13" font-style="italic">Trendelburg · Deisel · Friedrichsfeld</text>

    <!-- Arrow -->
    <path d="M 320 32 L 360 32" stroke="#d4a017" stroke-width="2.5" marker-end="url(#arrow-og)"/>

    <!-- Atlantic box -->
    <rect x="370" y="0" width="320" height="64" rx="4" fill="#4a76c8" opacity="0.85"/>
    <text x="530" y="28" text-anchor="middle" fill="#fff" font-size="12" font-weight="700" letter-spacing="3">ATLANTIC CROSSING</text>
    <text x="530" y="50" text-anchor="middle" fill="#dfe8fb" font-size="13" font-style="italic">ca. 1859</text>

    <!-- Arrow -->
    <path d="M 690 32 L 730 32" stroke="#d4a017" stroke-width="2.5" marker-end="url(#arrow-og)"/>

    <!-- St. Louis box -->
    <rect x="740" y="0" width="320" height="64" rx="4" fill="#c87a30" opacity="0.85"/>
    <text x="900" y="28" text-anchor="middle" fill="#fff" font-size="12" font-weight="700" letter-spacing="3">ST. LOUIS</text>
    <text x="900" y="50" text-anchor="middle" fill="#fdf2e0" font-size="13" font-style="italic">St. Marcus Church · Battery B · Old St. Marcus</text>

    <defs>
      <marker id="arrow-og" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M0,0 L10,5 L0,10 z" fill="#d4a017"/>
      </marker>
    </defs>
  </g>

  <!-- Bottom row -->
  <line x1="60" y1="546" x2="1140" y2="546" stroke="#8a5a14" stroke-width="0.8" stroke-dasharray="4,4"/>
  <text x="60" y="580" fill="#c8b896" font-size="18" letter-spacing="2">charles-research.netlify.app</text>
  <text x="1140" y="580" fill="#c8b896" font-size="14" font-style="italic" text-anchor="end">Compiled by Jed Johnson with Peter Schräder, Trendelburg</text>

</svg>
