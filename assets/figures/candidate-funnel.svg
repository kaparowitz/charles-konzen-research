<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="funnel-title funnel-desc" font-family="'Iowan Old Style','Georgia','Times New Roman',serif">
  <title id="funnel-title">Candidate-elimination funnel — 16 families investigated, 1 surviving working hypothesis</title>
  <desc id="funnel-desc">A funnel diagram showing the research methodology: 16 families were investigated for Charles Konzen's birth (1835); the funnel traces the 13 origin-candidate parish and surname pools. Successive analytic filters — birth-year window, parish jurisdiction, surname spelling congruence with the U.S. surname trail, and family composition consistent with later American records — eliminated all but one branch, the Trendelburg / Friedrichsfeld Konze pool of Churhessen, which remains the project's working hypothesis (concluded May 2026; figures current to June 2026). The June 2026 ring sweep extended the search to 36 parishes, eliminating two further candidates (Stammen's stillborn Konze male, b. 14 March 1835, and Dalhausen's F. W. Sievers, b. 26 January 1835) and logging Liebenau 1835 as a second held-open undigitised register alongside Heisebeck's post-1831 baptisms.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fffaf0"/>
      <stop offset="100%" stop-color="#f6ebd2"/>
    </linearGradient>
    <linearGradient id="elim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbeef3"/>
      <stop offset="100%" stop-color="#f4dada"/>
    </linearGradient>
    <linearGradient id="survive" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3d6"/>
      <stop offset="100%" stop-color="#f6ebbf"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a4a32"/>
    </marker>
    <style><![CDATA[
      /* DARK-MODE — responds to the OS color-scheme preference. */
      @media (prefers-color-scheme: dark) {
        /* Paper background → dark walnut */
        rect[fill="url(#bg)"] { fill: #1f1a14 !important; }

        /* Cream candidate-row cards / pale callouts → dark walnut */
        rect[fill="#fffaf0"], rect[fill="#fef3d6"], rect[fill="#fff3d6"],
        rect[fill="#fce8d6"] {
          fill: #2a2519 !important;
        }
        /* Pale eliminated / surviving gradients */
        rect[fill="url(#elim)"] { fill: #3a2530 !important; }
        rect[fill="url(#survive)"] { fill: #3a2f1e !important; }

        /* Dark borders → muted khaki so they stay visible */
        rect[stroke="#d8c8a8"], rect[stroke="#a88a4a"] {
          stroke: #6a5a40 !important;
        }

        /* Dark text fills → cream / gold / coral */
        text[fill="#1f1a14"], text[fill="#2c2620"], text[fill="#3a2f1e"],
        g[fill="#1f1a14"], g[fill="#2c2620"], g[fill="#3a2f1e"] {
          fill: #f4ead0 !important;
        }
        text[fill="#5a4a32"], text[fill="#6a5a42"],
        g[fill="#5a4a32"], g[fill="#6a5a42"] {
          fill: #c8b896 !important;
        }
        text[fill="#8a3a3a"], text[fill="#a3441f"],
        g[fill="#8a3a3a"], g[fill="#a3441f"] {
          fill: #f4a098 !important;
        }
        /* Arrow heads — flip from dark sepia to muted cream */
        marker path[fill="#5a4a32"] {
          fill: #c8b896 !important;
        }
      }
    ]]></style>
  </defs>

  <rect x="0" y="0" width="1180" height="620" fill="url(#bg)"/>

  <!-- Title -->
  <rect x="0" y="0" width="1180" height="46" fill="#2c2620"/>
  <text x="20" y="29" fill="#d4a017" font-size="14" font-weight="700" letter-spacing="2">CANDIDATE FUNNEL · 16 FAMILIES INVESTIGATED · 1 SURVIVING HYPOTHESIS</text>
  <text x="1160" y="29" fill="#c8b896" font-size="11" text-anchor="end">research method · current to June 2026</text>

  <!-- Column headers -->
  <g font-size="11" font-weight="700" fill="#5a4a32" letter-spacing="1" text-anchor="middle">
    <text x="170" y="80">CANDIDATE POOL</text>
    <text x="450" y="80">FILTER 1 · BIRTH WINDOW</text>
    <text x="710" y="80">FILTER 2 · SURNAME &amp; PARISH</text>
    <text x="1010" y="80">SURVIVING HYPOTHESIS</text>
  </g>
  <line x1="60" y1="92" x2="1120" y2="92" stroke="#a88a4a" stroke-width="0.7" stroke-dasharray="3,3"/>

  <!-- ============ Column 1 — 13 origin-candidate stack (of 16 families investigated) ============ -->
  <g transform="translate(60, 110)">
    <rect x="0" y="0" width="220" height="430" rx="6" fill="#fffaf0" stroke="#d8c8a8"/>
    <text x="110" y="22" text-anchor="middle" font-size="10.5" font-weight="700" fill="#5a4a32" letter-spacing="1">13 ORIGIN CANDIDATES</text>
    <text x="110" y="38" text-anchor="middle" font-size="9" fill="#6a5a42" font-style="italic">parish &amp; surname pools · of 16 families</text>

    <!-- Candidate rows. Heights tuned to fit. -->
    <g font-size="10.5" fill="#2c2620">
      <rect x="10" y="50" width="200" height="22" rx="3" fill="#fef3d6" stroke="#d4a017"/>
      <text x="20" y="65">Trendelburg Konze branch</text>

      <rect x="10" y="78" width="200" height="22" rx="3" fill="#fef3d6" stroke="#d4a017"/>
      <text x="20" y="93">Friedrichsfeld Kontze (Andreas)</text>

      <rect x="10" y="106" width="200" height="22" rx="3" fill="#fffaf0" stroke="#d8c8a8"/>
      <text x="20" y="121">Deisel Konzen "geb." mothers</text>

      <rect x="10" y="134" width="200" height="22" rx="3" fill="#fffaf0" stroke="#d8c8a8"/>
      <text x="20" y="149">Helmarshausen Konze</text>

      <rect x="10" y="162" width="200" height="22" rx="3" fill="#fffaf0" stroke="#d8c8a8"/>
      <text x="20" y="177">Sielen surname pool</text>

      <rect x="10" y="190" width="200" height="22" rx="3" fill="#fffaf0" stroke="#d8c8a8"/>
      <text x="20" y="205">Schöneberg surname pool</text>

      <rect x="10" y="218" width="200" height="22" rx="3" fill="#fffaf0" stroke="#d8c8a8"/>
      <text x="20" y="233">Hofgeismar regional records</text>

      <rect x="10" y="246" width="200" height="22" rx="3" fill="#fffaf0" stroke="#d8c8a8"/>
      <text x="20" y="261">Heisebeck (partly digitised)</text>

      <rect x="10" y="274" width="200" height="22" rx="3" fill="#fffaf0" stroke="#d8c8a8"/>
      <text x="20" y="289">Hümme Kontze line</text>

      <rect x="10" y="302" width="200" height="22" rx="3" fill="#fffaf0" stroke="#d8c8a8"/>
      <text x="20" y="317">Mainz Andreas Konze descendants</text>

      <rect x="10" y="330" width="200" height="22" rx="3" fill="#fffaf0" stroke="#d8c8a8"/>
      <text x="20" y="345">Phonetic-Janzen candidates</text>

      <rect x="10" y="358" width="200" height="22" rx="3" fill="#fffaf0" stroke="#d8c8a8"/>
      <text x="20" y="373">Phonetic-Gansen candidates</text>

      <rect x="10" y="386" width="200" height="22" rx="3" fill="#fffaf0" stroke="#d8c8a8"/>
      <text x="20" y="401">Illegitimate-birth scenarios</text>
    </g>
  </g>

  <!-- Funnel arrow Col1 → Col2 -->
  <path d="M 285 280 L 345 280" stroke="#5a4a32" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- ============ Column 2 — Filter: birth-year window ============ -->
  <g transform="translate(345, 110)">
    <rect x="0" y="0" width="220" height="430" rx="6" fill="#fffaf0" stroke="#d8c8a8"/>
    <text x="110" y="22" text-anchor="middle" font-size="10.5" font-weight="700" fill="#5a4a32" letter-spacing="1">FILTER 1 · BIRTH WINDOW</text>
    <text x="110" y="38" text-anchor="middle" font-size="9" fill="#6a5a42" font-style="italic">b. 26 Jan 1835 ± a few weeks</text>

    <g font-size="9.5">
      <!-- Surviving (gold) -->
      <rect x="10" y="60" width="200" height="60" rx="4" fill="url(#survive)" stroke="#d4a017" stroke-width="1.5"/>
      <text x="20" y="78" font-size="10.5" font-weight="700" fill="#1f1a14">7 candidates remain</text>
      <text x="20" y="92" fill="#5a4a32">Trendelburg Konze · Friedrichsfeld</text>
      <text x="20" y="105" fill="#5a4a32">Kontze · Helmarshausen · Sielen</text>
      <text x="20" y="115" fill="#5a4a32">+ 3 illegitimate-birth scenarios</text>

      <!-- Eliminated (red), reasons -->
      <rect x="10" y="135" width="200" height="280" rx="4" fill="url(#elim)" stroke="#8a4a4a" stroke-width="1.2"/>
      <text x="110" y="153" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8a3a3a" letter-spacing="0.5">6 ELIMINATED</text>
      <text x="110" y="167" text-anchor="middle" font-size="9" fill="#8a3a3a" font-style="italic">no candidate male b. ~1835</text>

      <g fill="#5a4a32" font-size="9.5">
        <text x="20" y="190" font-weight="700">Deisel Konzen mothers ✕</text>
        <text x="20" y="202">no Konze fathers in the right window</text>

        <text x="20" y="222" font-weight="700">Hofgeismar regional ✕</text>
        <text x="20" y="234">scope too broad; no isolated b. 1835</text>

        <text x="20" y="254" font-weight="700">Hümme Kontze ✕</text>
        <text x="20" y="266">last male in this line emigrated 1840s</text>

        <text x="20" y="286" font-weight="700">Mainz Andreas line ✕</text>
        <text x="20" y="298">family settled south after 1854</text>

        <text x="20" y="318" font-weight="700">Phonetic-Janzen ✕</text>
        <text x="20" y="330">no Hesse-side Janzen birth ~1835</text>

        <text x="20" y="350" font-weight="700">Phonetic-Gansen ✕</text>
        <text x="20" y="362">Gansen pool absent in Churhessen</text>

        <text x="20" y="385" font-style="italic" fill="#8a3a3a" font-size="8.5">▼ each elimination is logged with</text>
        <text x="20" y="397" font-style="italic" fill="#8a3a3a" font-size="8.5">the contradicting parish entry</text>
      </g>
    </g>
  </g>

  <!-- Funnel arrow Col2 → Col3 -->
  <path d="M 570 280 L 615 280" stroke="#5a4a32" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- ============ Column 3 — Filter: surname & parish congruence ============ -->
  <g transform="translate(615, 110)">
    <rect x="0" y="0" width="240" height="430" rx="6" fill="#fffaf0" stroke="#d8c8a8"/>
    <text x="120" y="22" text-anchor="middle" font-size="10.5" font-weight="700" fill="#5a4a32" letter-spacing="1">FILTER 2 · SURNAME &amp; PARISH</text>
    <text x="120" y="38" text-anchor="middle" font-size="9" fill="#6a5a42" font-style="italic">U.S. trail [ˈkɔn.sən] · "Deisse" stated origin</text>

    <g font-size="9.5">
      <rect x="10" y="60" width="220" height="76" rx="4" fill="url(#survive)" stroke="#d4a017" stroke-width="1.5"/>
      <text x="20" y="78" font-size="10.5" font-weight="700" fill="#1f1a14">2 candidates remain</text>
      <text x="20" y="93" fill="#5a4a32" font-style="italic">Both inside the Konze pool;</text>
      <text x="20" y="106" fill="#5a4a32" font-style="italic">both within 5 km of stated</text>
      <text x="20" y="119" fill="#5a4a32" font-style="italic">"Deisse, Kreis Cassel" origin.</text>

      <rect x="10" y="148" width="220" height="282" rx="4" fill="url(#elim)" stroke="#8a4a4a" stroke-width="1.2"/>
      <text x="120" y="166" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8a3a3a" letter-spacing="0.5">5 ELIMINATED</text>

      <g fill="#5a4a32" font-size="9.5">
        <text x="20" y="190" font-weight="700">Helmarshausen Konze ✕</text>
        <text x="20" y="202">parish 8 km from Deisel; no</text>
        <text x="20" y="214">Charles entry in 1835 register</text>

        <text x="20" y="234" font-weight="700">Sielen surname pool ✕</text>
        <text x="20" y="246">surname congruence weak;</text>
        <text x="20" y="258">no -en form in scribal record</text>

        <text x="20" y="278" font-weight="700">Schöneberg pool ✕</text>
        <text x="20" y="290">Grandjot territory · no Konze</text>

        <text x="20" y="310" font-weight="700">Heisebeck ✕ (held)</text>
        <text x="20" y="322">marriages searched — negative;</text>
        <text x="20" y="334">baptisms post-1831 in <tspan fill="#8a5a14" font-style="italic">Open Questions</tspan></text>

        <text x="20" y="354" font-weight="700">Illegitimate-birth pool ✕</text>
        <text x="20" y="366">multi-register Jan 1835 scan</text>
        <text x="20" y="378">surfaced no candidate</text>

        <text x="20" y="402" font-style="italic" fill="#8a3a3a" font-size="8.5">▼ all eliminations cite the specific</text>
        <text x="20" y="414" font-style="italic" fill="#8a3a3a" font-size="8.5">parish-register page</text>
      </g>
    </g>
  </g>

  <!-- Funnel arrow Col3 → Col4 -->
  <path d="M 860 280 L 905 280" stroke="#5a4a32" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- ============ Column 4 — Surviving hypothesis ============ -->
  <g transform="translate(905, 110)" filter="url(#soft)">
    <rect x="0" y="0" width="220" height="430" rx="8" fill="#fce8d6" stroke="#a3441f" stroke-width="2.5"/>
    <text x="110" y="24" text-anchor="middle" font-size="10.5" font-weight="700" fill="#a3441f" letter-spacing="1">★★★ WORKING HYPOTHESIS</text>
    <text x="110" y="40" text-anchor="middle" font-size="9" fill="#a3441f" font-style="italic">May 2026 · published as KONZEN</text>

    <rect x="14" y="60" width="192" height="120" rx="4" fill="#fff3d6" stroke="#d4a017" stroke-width="2"/>
    <text x="110" y="88" text-anchor="middle" font-size="22" font-weight="700" fill="#1f1a14">KONZEN</text>
    <text x="110" y="108" text-anchor="middle" font-size="10" font-style="italic" fill="#5a4a32">Trendelburg / Friedrichsfeld</text>
    <text x="110" y="122" text-anchor="middle" font-size="10" font-style="italic" fill="#5a4a32">Konze parish complex</text>
    <text x="110" y="142" text-anchor="middle" font-size="9" fill="#6a5a42">Churhessen · Kreis Cassel</text>
    <text x="110" y="158" text-anchor="middle" font-size="9" fill="#6a5a42">5 km from "Deisse" / Deisel</text>
    <text x="110" y="172" text-anchor="middle" font-size="9" fill="#6a5a42">stated 1866 marriage origin</text>

    <text x="14" y="208" font-size="10" font-weight="700" fill="#3a2f1e">Convergent evidence</text>
    <g font-size="9.5" fill="#5a4a32">
      <text x="14" y="226">→ Six U.S. spellings cluster on -en form</text>
      <text x="14" y="240">→ Konsen attested 2× across 15 years</text>
      <text x="14" y="254">→ Pastor Braschler "smoking gun"</text>
      <text x="14" y="268">→ Charles speaks at the bookend records</text>
      <text x="14" y="282">→ Auguste's 1896 record reads Conson</text>
      <text x="14" y="296">→ Trendelburg index lists Konze 1830s</text>
    </g>

    <text x="14" y="328" font-size="10" font-weight="700" fill="#a3441f">What still blocks promotion</text>
    <g font-size="9" fill="#8a3a3a">
      <text x="14" y="344">→ Jan 1835 baptism still unrecovered</text>
      <text x="14" y="358">→ no surviving Konze male b. 26 Jan</text>
      <text x="14" y="370">1835 in any digitised register</text>
      <text x="14" y="384">→ Heisebeck post-1831 baptisms &amp;</text>
      <text x="14" y="396">Liebenau 1835 undigitised</text>
    </g>

    <rect x="14" y="408" width="192" height="14" rx="2" fill="#a3441f"/>
    <text x="110" y="419" text-anchor="middle" font-size="9" font-weight="700" fill="#fff" letter-spacing="1">★ STATUS · WORKING</text>
  </g>

  <!-- Footer / methodology note -->
  <rect x="20" y="555" width="1140" height="48" rx="4" fill="#fffaf0" stroke="#d8c8a8"/>
  <text x="40" y="571" font-size="10.5" font-weight="700" fill="#5a4a32" letter-spacing="1">METHOD</text>
  <text x="40" y="585" font-size="10" fill="#3a2f1e">Each elimination on this funnel is logged on the relevant section page with the specific contradicting parish entry, the date searched, and the conditions under which it would be re-opened.</text>
  <text x="40" y="598" font-size="10" fill="#3a2f1e">June 2026 ring sweep: 36 parishes now searched — Stammen's stillborn Konze male (b. 14 Mar 1835) and Dalhausen's F. W. Sievers (b. 26 Jan 1835) eliminated; Liebenau 1835 joins Heisebeck as a held-open register.</text>

</svg>
