      <stop offset="0%"  stop-color="#fffaf0"/>
      <stop offset="100%" stop-color="#f6ebd2"/>
    </linearGradient>
    <linearGradient id="phase-found" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8d8a8"/>
      <stop offset="100%" stop-color="#c9a76a"/>
    </linearGradient>
    <linearGradient id="phase-recover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c8a4"/>
      <stop offset="100%" stop-color="#c87a30"/>
    </linearGradient>
    <linearGradient id="phase-active" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8a4a4"/>
      <stop offset="100%" stop-color="#c84a4a"/>
    </linearGradient>
    <linearGradient id="phase-synth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3d6"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
