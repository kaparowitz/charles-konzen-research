<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1240 540" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="ra-title ra-desc" font-family="'Iowan Old Style','Georgia','Times New Roman',serif">
  <title id="ra-title">Charles Research — investigation arc, 2017–May 2026</title>
  <desc id="ra-desc">A meta-timeline showing how the investigation itself unfolded — from the 2017 NARA mail-order foundation, through the 2020 AncestryProGenealogists commissioned journal, the September 2025 photograph recovery, the March 2026 project reboot with Peter Schräder, and the dense April–May 2026 working period that produced the surname conclusion.</desc>

